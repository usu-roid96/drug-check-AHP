<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>薬の安全検索</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; border: 2px solid #007bff; border-radius: 5px; }
        .drug-item { padding: 15px; border-bottom: 1px solid #eee; background: #f9f9f9; margin-bottom: 5px; border-radius: 5px; }
        .status-badge { font-weight: bold; padding: 2px 8px; border-radius: 3px; background: #ffcc00; }
    </style>
</head>
<body>
    <h1>💊 薬の安全検索</h1>
    <input type="text" id="searchInput" placeholder="薬の名前を入力してください...">
    <div id="results"></div>

    <script>
        let drugs = [];
        fetch('drugs.json')
            .then(r => r.json())
            .then(data => { drugs = data; })
            .catch(e => console.error("データ読み込み失敗"));

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const res = document.getElementById('results');
            res.innerHTML = '';
            if (q.length < 1) return;

            const filtered = drugs.filter(d => d.name_jp.includes(q));
            filtered.forEach(d => {
                const div = document.createElement('div');
                div.className = 'drug-item';
                div.innerHTML = `<strong>${d.name_jp}</strong><br>判定: <span class="status-badge">${d.status}</span>`;
                res.appendChild(div);
            });
        });
    </script>
</body>
</html>
